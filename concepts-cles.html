<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Concepts clés — Figen AI Academy</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a1628;
    --surface: #122336;
    --accent: #ffd34a;
    --text: #f5f7fa;
    --muted: #94a3b8;
    --line: #2a3349;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: "Public Sans", system-ui, -apple-system, sans-serif; }
  body { padding: 28px; min-height: 100vh; box-sizing: border-box; }
  h1 { margin: 0 0 4px 0; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .controls { margin-bottom: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { background: var(--surface); color: var(--text); border: 1px solid var(--line); padding: 6px 14px; border-radius: 16px; cursor: pointer; font: inherit; font-size: 13px; transition: all .15s; }
  .pill:hover { border-color: var(--accent); }
  .pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  svg { width: 100%; height: 380px; display: block; }
  .node rect { fill: var(--surface); stroke: var(--line); stroke-width: 1.5; rx: 8; }
  .node.active rect { fill: var(--accent); stroke: var(--accent); }
  .node text.title { font-weight: 600; font-size: 13px; fill: var(--text); }
  .node.active text.title { fill: var(--bg); }
  .node text.desc { font-size: 10.5px; fill: var(--muted); }
  .node.active text.desc { fill: rgba(10,22,40,.75); }
  .link { fill: none; stroke: var(--line); stroke-width: 1.5; }
  .link.active { stroke: var(--accent); stroke-width: 2.5; }
  .footer { margin-top: 8px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <h1>Bienvenue à <span>Figen AI Academy</span></h1>
  <div class="subtitle">Les 6 concepts qui structurent ce cours — cliquez sur un pilier pour explorer ses ramifications.</div>

  <div class="controls" id="controls"></div>

  <svg viewBox="0 0 880 380" preserveAspectRatio="xMidYMid meet"></svg>

  <div class="footer">Ce module est rendu dynamiquement via <strong>D3.js</strong>. Le YAML qui le déclare s'appelle <code>course.yaml</code> ; le CLI <code>learnworlds-pp-cli course apply</code> a poussé cette unité dans Academy.</div>

<script>
const concepts = [
  { id: "iag", label: "IA générative", color: "#ffd34a", children: [
    { label: "LLMs", desc: "Modèles génératifs textuels" },
    { label: "Embeddings", desc: "Représentations vectorielles" },
    { label: "Prompting", desc: "Instructions conditionnelles" },
  ]},
  { id: "rag", label: "RAG", color: "#7dd3fc", children: [
    { label: "Indexation", desc: "Vector DB + chunks" },
    { label: "Retrieval", desc: "Top-K similarity" },
    { label: "Génération", desc: "Augmentée par contexte" },
  ]},
  { id: "agt", label: "Agents", color: "#a5f3fc", children: [
    { label: "Tools", desc: "API & function calls" },
    { label: "Memory", desc: "Persistant + working" },
    { label: "Orchestration", desc: "Multi-step planning" },
  ]},
  { id: "code", label: "Course-as-Code", color: "#fda4af", children: [
    { label: "YAML", desc: "Source de vérité" },
    { label: "CLI", desc: "Applicateur idempotent" },
    { label: "Git", desc: "Versionning" },
  ]},
  { id: "fin", label: "Wealth IA", color: "#86efac", children: [
    { label: "CGP", desc: "Conseil patrimonial" },
    { label: "MIF", desc: "Adéquation client" },
    { label: "Compliance", desc: "AMF & ACPR" },
  ]},
  { id: "demo", label: "Cette démo", color: "#c4b5fd", children: [
    { label: "HTML5", desc: "Vous êtes ici" },
    { label: "Vidéo", desc: "HyperFrames MP4" },
    { label: "Audio", desc: "ElevenLabs TTS" },
  ]},
];

const svg = d3.select("svg");
const W = 880, H = 380;
const center = { x: W/2, y: H/2 };

// Compute hub + spoke positions.
const R = 130;
const hubR = 50;
const spokeR = 38;

concepts.forEach((c, i) => {
  const angle = (i / concepts.length) * Math.PI * 2 - Math.PI / 2;
  c.x = center.x + Math.cos(angle) * R;
  c.y = center.y + Math.sin(angle) * R;
});

// Hub
const hub = svg.append("g").attr("class", "hub");
hub.append("circle").attr("cx", center.x).attr("cy", center.y).attr("r", hubR)
   .attr("fill", "var(--surface)").attr("stroke", "var(--accent)").attr("stroke-width", 2);
hub.append("text").attr("x", center.x).attr("y", center.y - 4).attr("text-anchor", "middle")
   .attr("fill", "var(--accent)").attr("font-weight", "700").attr("font-size", "14").text("Figen AI");
hub.append("text").attr("x", center.x).attr("y", center.y + 12).attr("text-anchor", "middle")
   .attr("fill", "var(--muted)").attr("font-size", "10").text("Academy");

// Spokes
const links = svg.append("g");
const linkSel = links.selectAll("path").data(concepts).join("path")
  .attr("class", "link")
  .attr("d", d => `M${center.x},${center.y} L${d.x},${d.y}`);

const nodes = svg.append("g").selectAll("g").data(concepts).join("g")
  .attr("class", "node")
  .attr("transform", d => `translate(${d.x},${d.y})`)
  .style("cursor", "pointer")
  .on("click", (e, d) => activate(d.id));

nodes.append("rect").attr("x", -55).attr("y", -22).attr("width", 110).attr("height", 44);
nodes.append("text").attr("class", "title").attr("text-anchor", "middle").attr("dy", 4).text(d => d.label);

// Side panel for active concept
const panel = svg.append("g").attr("class", "panel").attr("transform", `translate(${W/2 - 200}, ${H - 90})`).style("display", "none");
panel.append("rect").attr("x", 0).attr("y", 0).attr("width", 400).attr("height", 80).attr("rx", 8)
  .attr("fill", "var(--surface)").attr("stroke", "var(--accent)").attr("stroke-width", 1.5);
panel.append("text").attr("class", "ptitle").attr("x", 16).attr("y", 22)
  .attr("font-weight", "700").attr("font-size", "13").attr("fill", "var(--accent)");
const pchildren = panel.append("g").attr("transform", "translate(16, 38)");

function activate(id) {
  nodes.classed("active", d => d.id === id);
  linkSel.classed("active", d => d.id === id);
  const c = concepts.find(x => x.id === id);
  if (!c) return;
  panel.style("display", null);
  panel.select(".ptitle").text(c.label + " — décliné en");
  const items = pchildren.selectAll("g").data(c.children);
  items.exit().remove();
  const e = items.enter().append("g").attr("transform", (_, i) => `translate(${i * 130}, 0)`);
  e.append("text").attr("font-weight", "600").attr("font-size", "11.5").attr("fill", "var(--text)").attr("y", 0).text(d => d.label);
  e.append("text").attr("font-size", "10").attr("fill", "var(--muted)").attr("y", 16).text(d => d.desc);
  items.attr("transform", (_, i) => `translate(${i * 130}, 0)`);
  items.select("text:nth-child(1)").text(d => d.label);
  items.select("text:nth-child(2)").text(d => d.desc);
}

// Build controls
const ctrl = d3.select("#controls");
ctrl.selectAll("button").data(concepts).join("button")
  .attr("class", "pill")
  .text(d => d.label)
  .on("click", (e, d) => {
    ctrl.selectAll(".pill").classed("active", x => x.id === d.id);
    activate(d.id);
  });

// Auto-cycle for the first 10 seconds, then stop
let i = 0;
const auto = setInterval(() => {
  const d = concepts[i % concepts.length];
  ctrl.selectAll(".pill").classed("active", x => x.id === d.id);
  activate(d.id);
  i++;
  if (i >= concepts.length) clearInterval(auto);
}, 1400);
</script>
</body>
</html>
