<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz — Figen AI Academy</title>
<style>
  :root { --bg:#0a1628; --surface:#122336; --accent:#ffd34a; --text:#f5f7fa; --muted:#94a3b8; --line:#2a3349; --ok:#86efac; --bad:#fda4af; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:"Public Sans",system-ui,sans-serif; }
  body { padding:28px; min-height:100vh; box-sizing:border-box; }
  h1 { margin:0 0 6px 0; font-size:22px; font-weight:700; }
  h1 span { color:var(--accent); }
  .progress { color:var(--muted); font-size:13px; margin-bottom:22px; }
  .question { background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:20px 22px; margin-bottom:16px; }
  .qtitle { font-weight:600; font-size:15px; margin-bottom:14px; line-height:1.4; }
  .choice { display:block; background:#1a2942; border:1.5px solid var(--line); border-radius:8px; padding:11px 14px; margin-bottom:8px; cursor:pointer; font:inherit; font-size:13.5px; color:var(--text); text-align:left; width:100%; box-sizing:border-box; transition:all .15s; }
  .choice:hover:not(:disabled) { border-color:var(--accent); }
  .choice.selected { border-color:var(--accent); background:#1f3050; }
  .choice.correct { border-color:var(--ok); background:rgba(134,239,172,.12); }
  .choice.wrong { border-color:var(--bad); background:rgba(253,164,175,.12); }
  .choice:disabled { cursor:default; }
  .feedback { margin-top:10px; padding:10px 14px; border-radius:6px; font-size:13px; display:none; }
  .feedback.show { display:block; }
  .feedback.ok { background:rgba(134,239,172,.12); color:var(--ok); border-left:3px solid var(--ok); }
  .feedback.bad { background:rgba(253,164,175,.12); color:var(--bad); border-left:3px solid var(--bad); }
  .actions { margin-top:18px; display:flex; gap:10px; align-items:center; }
  button.primary { background:var(--accent); color:var(--bg); border:none; padding:10px 22px; border-radius:6px; font-weight:600; cursor:pointer; font:inherit; font-size:13.5px; }
  button.primary:disabled { opacity:.4; cursor:not-allowed; }
  .result { background:var(--surface); border:2px solid var(--accent); border-radius:10px; padding:24px; text-align:center; display:none; }
  .result.show { display:block; }
  .score { font-size:42px; font-weight:700; color:var(--accent); margin:8px 0; }
  .summary { color:var(--muted); font-size:14px; }
</style>
</head>
<body>

<h1>Quiz — <span>Figen AI Academy</span></h1>
<div class="progress" id="progress">Question 1 sur 5</div>

<div id="quiz"></div>

<div class="result" id="result">
  <div style="font-size:14px; color:var(--muted);">Votre score</div>
  <div class="score" id="score">0 / 5</div>
  <div class="summary" id="summary"></div>
</div>

<script>
const questions = [
  {
    q: "Quelle est la commande CLI pour appliquer un course.yaml à LearnWorlds ?",
    choices: [
      "learnworlds-pp-cli course apply --from course.yaml --confirm",
      "learnworlds-pp-cli upload course.yaml",
      "learnworlds-pp-cli sync --yaml course.yaml",
      "lwc apply course.yaml",
    ],
    correct: 0,
    explanation: "course apply est la commande Course-as-Code idempotente : create + section + unit + attach en un seul flow.",
  },
  {
    q: "Quel flag re-POST le contenu des unités déjà existantes lors d'un re-apply ?",
    choices: [ "--update", "--force", "--reapply", "--refresh" ],
    correct: 0,
    explanation: "--update bascule sur POST /api/objects/{type}/{existing-id} au lieu de skip-if-exists.",
  },
  {
    q: "Quel type d'unit accepte du HTML arbitraire (D3, GSAP, iframes) ?",
    choices: [ "youtube", "embed", "pbEbook", "scorm" ],
    correct: 1,
    explanation: "Le type embed met le contenu dans data.embed et l'UI rend l'HTML tel quel — idéal pour dynamic content depuis un Gist.",
  },
  {
    q: "Quel flag retire les unités live qui ne sont PAS dans le YAML ?",
    choices: [ "--delete", "--clean", "--prune", "--purge" ],
    correct: 2,
    explanation: "--prune fait du soft-delete via unlink du learningPath. L'objet unit persiste, il devient orphelin.",
  },
  {
    q: "À quoi sert la commande `course pull --slug X --out X.yaml` ?",
    choices: [
      "Télécharger les vidéos d'un cours",
      "Cloner le cours en local pour l'éditer",
      "Convertir un cours live en course.yaml editable",
      "Synchroniser depuis Coursera",
    ],
    correct: 2,
    explanation: "Round-trip pull → edit → apply : la base du workflow Course-as-Code à partir d'un cours existant.",
  },
];

let current = 0, score = 0, answered = Array(questions.length).fill(null);

function render() {
  if (current >= questions.length) return renderResult();
  document.getElementById("progress").textContent = `Question ${current+1} sur ${questions.length}`;
  const q = questions[current];
  const qd = document.getElementById("quiz");
  qd.innerHTML = "";
  const box = document.createElement("div");
  box.className = "question";
  box.innerHTML = `<div class="qtitle">${q.q}</div>`;
  q.choices.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = c;
    b.onclick = () => choose(i);
    box.appendChild(b);
  });
  const fb = document.createElement("div");
  fb.className = "feedback"; fb.id = "fb";
  box.appendChild(fb);
  const act = document.createElement("div");
  act.className = "actions";
  const next = document.createElement("button");
  next.className = "primary"; next.id = "next";
  next.textContent = current === questions.length - 1 ? "Voir le score" : "Question suivante →";
  next.disabled = true;
  next.onclick = () => { current++; render(); };
  act.appendChild(next);
  box.appendChild(act);
  qd.appendChild(box);
}

function choose(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  const q = questions[current];
  const ok = i === q.correct;
  if (ok) score++;
  document.querySelectorAll(".choice").forEach((b, idx) => {
    b.disabled = true;
    if (idx === q.correct) b.classList.add("correct");
    else if (idx === i && !ok) b.classList.add("wrong");
  });
  const fb = document.getElementById("fb");
  fb.classList.add("show", ok ? "ok" : "bad");
  fb.textContent = (ok ? "✓ Exact. " : "✗ Mauvaise réponse. ") + q.explanation;
  document.getElementById("next").disabled = false;
}

function renderResult() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("progress").style.display = "none";
  const r = document.getElementById("result");
  r.classList.add("show");
  document.getElementById("score").textContent = `${score} / ${questions.length}`;
  const pct = score / questions.length;
  let msg;
  if (pct === 1) msg = "Sans-faute. Tu maîtrises le Course-as-Code de bout en bout.";
  else if (pct >= 0.6) msg = "Bien joué — tu peux livrer une démo Course-as-Code sans documentation.";
  else msg = "Relis le module HTML5 et reviens — la mécanique mérite un deuxième tour.";
  document.getElementById("summary").textContent = msg;
}

render();
</script>
</body>
</html>
